# docker-compose.prod.yml

services:
  # ── PostgreSQL ────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: webboard_db_prod
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - webboard_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: webboard_redis_prod
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - webboard_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Django 백엔드 ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: webboard_backend_prod
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./backend/logs:/app/logs
    environment:
      - DJANGO_ENV=${DJANGO_ENV}
      - DEBUG=${DEBUG}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - ADMIN_URL=${ADMIN_URL}
      # DB
      - DB_ENGINE=${DB_ENGINE}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      # CORS / CSRF
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Gunicorn
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-4}
      - GUNICORN_THREADS=${GUNICORN_THREADS:-2}
      - GUNICORN_TIMEOUT=${GUNICORN_TIMEOUT:-120}
      # ✅ [수정] localhost → mediasoup (Docker 서비스명으로 내부 통신)
      - MEDIASOUP_API_URL=http://mediasoup:3000
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8000 && nc -z localhost 8001 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mediasoup:
        condition: service_healthy
    restart: always
    networks:
      - webboard_network
    expose:
      - "8000"
      - "8001"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── React 프론트엔드 ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL=${VITE_API_URL:-https://jounsori.org/api}
        - VITE_WS_URL=${VITE_WS_URL:-wss://jounsori.org/ws}
        - VITE_TURN_URL=${VITE_TURN_URL:-turn:jounsori.org:3478}
        - VITE_TURN_SECRET=${VITE_TURN_SECRET}
    container_name: webboard_frontend_prod
    restart: always
    networks:
      - webboard_network
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: webboard_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_volume:/staticfiles:ro
      - media_volume:/media:ro
      - ./fonts:/usr/share/nginx/html/fonts:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
      mediasoup:
        condition: service_healthy
    restart: always
    networks:
      - webboard_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Certbot ───────────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: webboard_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    restart: unless-stopped
    networks:
      - webboard_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── mediasoup SFU ─────────────────────────────────────────────
  mediasoup:
    build:
      context: ./mediasoup
      dockerfile: Dockerfile
    container_name: webboard_mediasoup
    environment:
      - NODE_ENV=production
      - MEDIASOUP_HTTP_PORT=3000
      - MEDIASOUP_ANNOUNCED_IP=${MEDIASOUP_ANNOUNCED_IP}
      - MEDIASOUP_RTP_MIN_PORT=${MEDIASOUP_RTP_MIN_PORT:-40000}
      - MEDIASOUP_RTP_MAX_PORT=${MEDIASOUP_RTP_MAX_PORT:-40099}
      - MEDIASOUP_NUM_WORKERS=${MEDIASOUP_NUM_WORKERS:-2}
      - TRUSTED_ORIGINS=http://backend:8000
    ports:
      # ✅ RTP 미디어 포트 — 클라이언트 WebRTC가 호스트 IP로 직접 접속
      - "${MEDIASOUP_RTP_MIN_PORT:-40000}-${MEDIASOUP_RTP_MAX_PORT:-40099}:${MEDIASOUP_RTP_MIN_PORT:-40000}-${MEDIASOUP_RTP_MAX_PORT:-40099}/udp"
      - "${MEDIASOUP_RTP_MIN_PORT:-40000}-${MEDIASOUP_RTP_MAX_PORT:-40099}:${MEDIASOUP_RTP_MIN_PORT:-40000}-${MEDIASOUP_RTP_MAX_PORT:-40099}/tcp"
    # ✅ [수정] network_mode: host 제거 → webboard_network 합류
    #    backend가 http://mediasoup:3000 으로 내부 통신 가능
    networks:
      - webboard_network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ── coturn TURN/STUN 서버 ─────────────────────────────────────
  # coturn은 호스트 IP 바인딩이 필요하므로 network_mode: host 유지 (정상)
  coturn:
    image: coturn/coturn:latest
    container_name: webboard_coturn
    network_mode: host
    command: >
      -n
      --log-file=-
      --use-auth-secret
      --static-auth-secret=${TURN_SECRET}
      --realm=jounsori.org
      --external-ip=${MEDIASOUP_ANNOUNCED_IP}
      --listening-port=3478
      --tls-listening-port=5349
      --min-port=49160
      --max-port=49200
      --no-multicast-peers
      --denied-peer-ip=10.0.0.0-10.255.255.255
      --denied-peer-ip=172.16.0.0-172.31.255.255
      --denied-peer-ip=192.168.0.0-192.168.255.255
      --total-quota=100
      --stale-nonce=600
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

networks:
  webboard_network:
    driver: bridge
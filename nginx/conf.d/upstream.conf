# nginx/conf.d/upstream.conf

# ── Backend Upstreams ─────────────────────────────────────────
# backend는 시작 시 항상 존재하므로 upstream 블록 사용 가능

upstream gunicorn_backend {
    server backend:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream daphne_backend {
    server backend:8001 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# ── frontend는 upstream 블록 사용 안 함 ──────────────────────
# nginx 시작 시 frontend 컨테이너가 준비되지 않으면
# "host not found in upstream" 오류로 nginx 자체가 기동 불가
# → webboard-ssl.conf 에서 resolver + set $변수 방식으로 처리
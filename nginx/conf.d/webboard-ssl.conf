# nginx/conf.d/webboard-ssl.conf
# mediasoup SFU는 내부 네트워크 전용 — nginx를 통해 외부에 노출하지 않음
# 클라이언트는 WebRTC(UDP/TCP)로 mediasoup에 직접 연결

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ============================================================
# HTTPS
# ============================================================
server {
    listen 443 ssl;
    http2 on;
    server_name jounsori.org www.jounsori.org;

    # ── SSL ──────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/jounsori.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jounsori.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256';
    ssl_ecdh_curve      secp384r1;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/jounsori.org/chain.pem;

    # ── [핵심] Docker 내부 DNS resolver ──────────────────────
    # 127.0.0.11 = Docker 내장 DNS
    # valid=10s  = 10초마다 재조회 → 컨테이너 재시작 후 자동 반영
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ── [핵심] frontend를 변수로 선언 ────────────────────────
    # upstream 블록 대신 set $변수 사용 → nginx 시작 시 DNS 조회 안 함
    # frontend 컨테이너가 나중에 뜨더라도 nginx가 정상 기동됨
    set $frontend_upstream http://frontend:80;

    # ── 보안 헤더 ─────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-XSS-Protection          "1; mode=block"      always;
    add_header X-Content-Type-Options    "nosniff"             always;
    add_header X-Frame-Options           "DENY"                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(self), camera=(self), display-capture=(self)" always;

    # ✅ [배경 블러/이미지 수정] MediaPipe WASM(SharedArrayBuffer) 실행을 위한 Cross-Origin 격리 헤더
    # 이 두 헤더가 없으면 브라우저가 SharedArrayBuffer를 차단하여 selfie_segmentation.wasm이 동작하지 않음
    add_header Cross-Origin-Opener-Policy  "same-origin"   always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://unpkg.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: https://unpkg.com; connect-src 'self' wss://jounsori.org https://jounsori.org; media-src 'self' https:; object-src 'none'; frame-ancestors 'none'; upgrade-insecure-requests; block-all-mixed-content;" always;

    # ── 기본 ─────────────────────────────────────────────────
    client_max_body_size    100M;
    client_body_buffer_size 16M;
    client_body_timeout     300s;
    client_header_timeout   60s;
    limit_conn conn_limit_per_ip 10;

    # ── WebSocket (Daphne / Django Channels) ──────────────────
    location /ws/video-meeting/ {
        proxy_pass http://daphne_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host                $host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   https;
        proxy_set_header X-Forwarded-Host    $host;
        proxy_set_header X-Forwarded-Port    443;

        proxy_connect_timeout   60s;
        proxy_send_timeout      7200s;
        proxy_read_timeout      7200s;
        proxy_buffering         off;
        proxy_cache             off;
        proxy_request_buffering off;
        proxy_socket_keepalive  on;
        proxy_buffer_size       16k;
        proxy_buffers           8 16k;

        access_log /var/log/nginx/websocket_access.log;
        error_log  /var/log/nginx/websocket_error.log warn;
    }

    # ── 프론트엔드 ────────────────────────────────────────────
    location / {
        limit_req zone=req_limit_per_ip burst=20 nodelay;
        # ✅ upstream 블록 대신 변수 사용 → 시작 시 DNS 조회 안 함
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;
        proxy_set_header Connection        "";
        proxy_redirect   http:// https://;
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── 비디오 미팅 API ───────────────────────────────────────
    location ~ ^/api/video-meetings/ {
        proxy_pass http://gunicorn_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;
        proxy_set_header Connection        "";
        proxy_redirect   http:// https://;
        proxy_connect_timeout    60s;
        proxy_send_timeout       60s;
        proxy_read_timeout       60s;
        proxy_buffering          off;
        proxy_request_buffering  off;
        client_max_body_size     100M;
        client_body_timeout      60s;
    }

    # ── 일반 API ──────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=100 nodelay;
        proxy_pass http://gunicorn_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;
        proxy_set_header Connection        "";
        proxy_redirect   http:// https://;
        proxy_connect_timeout    60s;
        proxy_send_timeout       60s;
        proxy_read_timeout       60s;
        proxy_buffering          off;
        proxy_request_buffering  off;
        client_max_body_size     100M;
        client_body_timeout      60s;
    }

    # ── Django Admin ──────────────────────────────────────────
    location /admin/ {
        proxy_pass http://gunicorn_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;
        proxy_set_header Connection        "";
        proxy_redirect   http:// https://;
        proxy_connect_timeout    300s;
        proxy_send_timeout       300s;
        proxy_read_timeout       300s;
        client_max_body_size     100M;
        client_body_timeout      300s;
    }

    # ── 정적 파일 ─────────────────────────────────────────────
    location /static/ {
        alias /staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        location ~* \.(ttf|otf|woff|woff2|eot)$ {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
        gzip_static on;
        access_log off;
    }

    # ── 미디어 파일 ───────────────────────────────────────────
    location /media/ {
        alias /media/;
        set $cors_origin "";
        if ($http_origin ~* (https://jounsori\.org|https://www\.jounsori\.org)) {
            set $cors_origin $http_origin;
        }
        add_header Access-Control-Allow-Origin  $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header X-Content-Type-Options       "nosniff" always;
        location ~ \.pdf$ {
            add_header Content-Type "application/pdf" always;
            add_header Content-Disposition "inline" always;
            expires 7d;
        }
        location ~ \.(mp3|m4a|wav|ogg)$ {
            add_header Content-Type   "audio/mpeg" always;
            add_header Accept-Ranges  bytes always;
            expires 7d;
        }
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Health / 기타 ─────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
    location = /favicon.ico { access_log off; log_not_found off; expires 30d; }
    location = /robots.txt  { access_log off; log_not_found off; expires 7d;  }
}

# ============================================================
# HTTP → HTTPS 리다이렉트
# ============================================================
server {
    listen 80;
    server_name jounsori.org www.jounsori.org;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location /health { return 200 "OK\n"; access_log off; }
    location / { return 301 https://$host$request_uri; }
}